<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Платформер: прыгай и собирай монеты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f3a 0%, #0a1f2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
        }
        .game-container {
            background: #1e3a3f;
            border-radius: 32px;
            padding: 16px 20px 20px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 14px;
            margin-bottom: 6px;
            padding: 0 10px;
        }
        .score-box {
            background: #00000066;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.6rem;
            color: #f7e05e;
            text-shadow: 0 2px 0 #7a5c1a;
            letter-spacing: 1px;
        }
        .restart-btn {
            background: #f4c542;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #2d2b1f;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a05e15;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a05e15;
        }
        .controls-hint {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 10px;
            color: #bcd4de;
            background: #0f2c2e80;
            display: inline-block;
            width: auto;
            padding: 4px 16px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }
        .status {
            font-size: 1rem;
            font-weight: bold;
            background: #00000077;
            padding: 4px 12px;
            border-radius: 28px;
            color: #f2d86d;
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div class="info-panel">
            <div class="score-box">💰 <span id="coinCounter">0</span></div>
            <button class="restart-btn" id="resetGame">⟳ НОВАЯ ИГРА</button>
        </div>
        <footer>
            <div class="controls-hint">◀  ▶  или  A  D  |  ПРОБЕЛ (прыжок)</div>
            <div class="status" id="gameStatusText">🏃‍♂️ В ДВИЖЕНИИ</div>
        </footer>
    </div>
</div>

<script>
    (function(){
        // ---------- НАСТРОЙКИ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // размеры мира
        const W = 800, H = 450;
        let gameRunning = true;
        let score = 0;
        
        // ----- ИГРОК -----
        const PLAYER_WIDTH = 28;
        const PLAYER_HEIGHT = 32;
        let player = {
            x: 80,
            y: 0,        // будет установлено после генерации земли
            vx: 0,
            vy: 0,
            onGround: false,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT
        };
        
        // гравитация / прыжок
        const GRAVITY = 0.65;
        const JUMP_POWER = -11;
        
        // ----- ПЛАТФОРМЫ -----
        // все платформы: [x, y, width, height]
        let platforms = [];
        
        // ----- МОНЕТКИ (коллекционируемые предметы) -----
        let coins = [];
        const COIN_SIZE = 12;
        
        // камера (фиктивная, но для удобства, игрок всегда в центре? нет, просто рисуем со смещением если нужно, но мир статичен)
        // т.к. карта не выходит за границы по горизонтали, но для динамики добавим ограничения движения игрока по X
        // сделаем так, чтобы игрок не выходил за края мира 0..W
        // платформы создадим красивые
        
        // ---- вспомогательные функции ----
        function generateLevel(){
            // классический набор платформ (x, y, ширина, высота)
            platforms = [
                // земля (основная платформа внизу)
                { x: 0, y: H - 40, w: W, h: 40 },
                // стартовая платформа слева вверху (мостик)
                { x: 70, y: H - 120, w: 100, h: 20 },
                // центральная платформа
                { x: 260, y: H - 180, w: 90, h: 20 },
                // правая платформа 1
                { x: 450, y: H - 230, w: 85, h: 20 },
                // высокая платформа над пропастью
                { x: 620, y: H - 140, w: 70, h: 20 },
                // верхняя правая платформа с монеткой
                { x: 540, y: H - 290, w: 70, h: 20 },
                // дополнительная слева наверху
                { x: 20, y: H - 280, w: 90, h: 20 },
                // островок в центре
                { x: 340, y: H - 340, w: 75, h: 18 },
                // дальний угол
                { x: 690, y: H - 360, w: 80, h: 20 },
                // узкая платформа для челленджа
                { x: 180, y: H - 390, w: 55, h: 18 }
            ];
            
            // Генерация монеток на основе платформ + добавим воздушные монеты
            coins = [];
            // монетки над платформами (над каждой платформой кроме земли)
            for(let plat of platforms){
                if(plat.y >= H-50) continue; // на земле не кладем лишние, но можно пару
                // количество монеток зависит от ширины
                let coinCount = Math.floor(plat.w / 35) + 1;
                for(let i = 0; i < coinCount; i++){
                    let offsetX = plat.x + 15 + i * 30;
                    if(offsetX + COIN_SIZE/2 > plat.x + plat.w - 8) continue;
                    coins.push({
                        x: offsetX,
                        y: plat.y - 10,
                        w: COIN_SIZE,
                        h: COIN_SIZE,
                        collected: false
                    });
                }
            }
            // добавим "воздушные" монетки между платформами для интереса
            coins.push({ x: 130, y: H - 210, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            coins.push({ x: 480, y: H - 180, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            coins.push({ x: 610, y: H - 310, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            coins.push({ x: 390, y: H - 295, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            coins.push({ x: 50, y: H - 340, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            coins.push({ x: 730, y: H - 420, w: COIN_SIZE, h: COIN_SIZE, collected: false });
            // устраним дублирование/слишком много, но оставим веселье
            }
        
        // позиционируем игрока на старте (на первую платформу, которая земля или стартовая)
        function setPlayerStart(){
            // находим землю или платформу, на которую ставим игрока
            let spawnPlat = platforms.find(p => p.x <= 80 && p.x + p.w >= 80 && p.y < H-50);
            if(!spawnPlat) spawnPlat = platforms[0]; // земля
            player.x = 80;
            player.y = spawnPlat.y - PLAYER_HEIGHT;
            player.vx = 0;
            player.vy = 0;
            player.onGround = true;
            // дополнительная проверка на пересечение при старте
            if(player.y + PLAYER_HEIGHT > spawnPlat.y + spawnPlat.h) player.y = spawnPlat.y - PLAYER_HEIGHT;
            if(player.y < 0) player.y = 0;
        }
        
        // коллизия игрока с платформами (вертикальная + горизонтальная)
        function handleCollisions(){
            // горизонтальное перемещение с коррекцией
            player.x += player.vx;
            // ограничение по миру
            if(player.x < 0) player.x = 0;
            if(player.x + player.width > W) player.x = W - player.width;
            
            // временно сохраняем статус на земле
            let wasOnGround = player.onGround;
            player.onGround = false;
            
            // сортировка платформ для устойчивости (необязательно)
            for(let plat of platforms){
                // пересечение по оси X
                if(player.x + player.width > plat.x && player.x < plat.x + plat.w){
                    // коллизия по Y
                    let prevY = player.y;
                    // сначала проверяем падение сверху
                    if(player.vy >= 0 && (prevY + player.height) <= plat.y + 8 && (prevY + player.height + player.vy) >= plat.y){
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    // коллизия головой (прыжок в потолок)
                    else if(player.vy < 0 && prevY >= plat.y + plat.h - 5 && prevY + player.vy <= plat.y + plat.h){
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    }
                    // боковая коррекция уже сделана выше, но если застрял - легкий фикс
                    else if(player.vy > 0 && prevY + player.height > plat.y && prevY < plat.y + plat.h){
                        // дополнительная коррекция, чтобы не провалился
                        if(player.y + player.height <= plat.y + 12 && player.y + player.height + player.vy >= plat.y){
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.onGround = true;
                        }
                    }
                }
            }
            
            // гравитация (если не на земле)
            if(!player.onGround){
                player.vy += GRAVITY;
            } else {
                if(player.vy > 0) player.vy = 0;
            }
            player.y += player.vy;
            
            // доп. проверка выхода за верх/низ карты
            if(player.y + player.height > H){
                player.y = H - player.height;
                player.vy = 0;
                player.onGround = true;
                // если упал ниже уровня мира — смерть (рестарт)
                if(player.y + player.height > H){
                    gameOver();
                }
            }
            if(player.y < 0){
                player.y = 0;
                if(player.vy < 0) player.vy = 0;
            }
            
            // маленькая страховка: если игрок провалился сквозь платформы (ушел под карту)
            if(player.y + player.height > H + 20){
                 gameOver();
            }
        }
        
        // сбор монет
        function collectCoins(){
            for(let i=0; i<coins.length; i++){
                const c = coins[i];
                if(c.collected) continue;
                // проверка пересечения с игроком
                if(player.x < c.x + c.w && player.x + player.width > c.x &&
                   player.y < c.y + c.h && player.y + player.height > c.y){
                    c.collected = true;
                    score++;
                    document.getElementById('coinCounter').innerText = score;
                    // небольшая визуальная обратная связь
                }
            }
        }
        
        // проверка победы (все монеты собраны)
        function checkWin(){
            const allCollected = coins.length > 0 && coins.every(c => c.collected === true);
            if(allCollected && gameRunning){
                gameRunning = false;
                document.getElementById('gameStatusText').innerHTML = "✨ ПОБЕДА! ✨";
                document.getElementById('gameStatusText').style.color = "#f9e75c";
            }
        }
        
        // функция game over
        function gameOver(){
            if(!gameRunning) return;
            gameRunning = false;
            document.getElementById('gameStatusText').innerHTML = "💀 ПАДЕНИЕ... НАЖМИТЕ НОВАЯ ИГРА 💀";
            document.getElementById('gameStatusText').style.color = "#ffac9e";
        }
        
        // сброс всей игры
        function resetGame(){
            gameRunning = true;
            score = 0;
            document.getElementById('coinCounter').innerText = "0";
            generateLevel();
            setPlayerStart();
            document.getElementById('gameStatusText').innerHTML = "🏃‍♂️ В ДВИЖЕНИИ";
            document.getElementById('gameStatusText').style.color = "#f2d86d";
            // сброс скорости
            player.vx = 0;
            player.vy = 0;
            player.onGround = true;
        }
        
        // управление клавишами
        const keys = {
            ArrowLeft: false, ArrowRight: false,
            KeyA: false, KeyD: false,
            Space: false
        };
        
        function handleInput(){
            let move = 0;
            if(keys.ArrowLeft || keys.KeyA) move = -1;
            if(keys.ArrowRight || keys.KeyD) move = 1;
            // скорость движения
            const WALK_ACC = 0.55;
            const MAX_SPEED = 4.6;
            player.vx += move * WALK_ACC;
            if(Math.abs(player.vx) > MAX_SPEED) player.vx = Math.sign(player.vx) * MAX_SPEED;
            // трение на земле
            if(player.onGround && move === 0){
                player.vx *= 0.92;
                if(Math.abs(player.vx) < 0.1) player.vx = 0;
            } else if(!player.onGround){
                // небольшое сопротивление воздуха
                player.vx *= 0.99;
            }
            
            // прыжок (только если на земле и игра активна)
            if(keys.Space && player.onGround && gameRunning){
                player.vy = JUMP_POWER;
                player.onGround = false;
                // предотвращаем залипание прыжка (искусственно снимаем флаг на мгновение)
                keys.Space = false;
            }
        }
        
        // --- ОТРИСОВКА ВСЕГО ---
        function draw(){
            ctx.clearRect(0, 0, W, H);
            // градиентный фон
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, "#b2e0fa");
            grad.addColorStop(0.7, "#e0f0c8");
            grad.addColorStop(1, "#cfc6a4");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            
            // рисуем облака для атмосферы
            ctx.fillStyle = "#ffffffc0";
            ctx.beginPath();
            ctx.ellipse(120, 60, 45, 35, 0, 0, Math.PI*2);
            ctx.ellipse(170, 45, 40, 32, 0, 0, Math.PI*2);
            ctx.ellipse(70, 55, 38, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(650, 85, 55, 40, 0, 0, Math.PI*2);
            ctx.ellipse(590, 70, 40, 33, 0, 0, Math.PI*2);
            ctx.ellipse(710, 78, 42, 35, 0, 0, Math.PI*2);
            ctx.fill();
            
            // платформы (деревянный стиль)
            for(let plat of platforms){
                // тень
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.shadowBlur = 6;
                ctx.fillStyle = "#8b5a2b";
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = "#b87c3a";
                ctx.fillRect(plat.x+3, plat.y, plat.w-6, 6);
                ctx.fillStyle = "#d99e4a";
                ctx.fillRect(plat.x+2, plat.y+plat.h-4, plat.w-4, 4);
                ctx.fillStyle = "#714623";
                ctx.fillRect(plat.x, plat.y+plat.h-2, plat.w, 2);
                ctx.shadowBlur = 0;
                // текстура досок
                ctx.strokeStyle = "#c2843e";
                ctx.lineWidth = 1.5;
                for(let i=0; i<3; i++){
                    let lineY = plat.y + 6 + i*8;
                    if(lineY < plat.y+plat.h-6)
                        ctx.beginPath(), ctx.moveTo(plat.x+4, lineY), ctx.lineTo(plat.x+plat.w-4, lineY), ctx.stroke();
                }
            }
            
            // монетки (блестящие)
            for(let c of coins){
                if(c.collected) continue;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "gold";
                ctx.fillStyle = "#f7d44a";
                ctx.beginPath();
                ctx.ellipse(c.x + c.w/2, c.y + c.h/2, c.w/2, c.h/2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#f5b81b";
                ctx.beginPath();
                ctx.ellipse(c.x + c.w/2 - 1, c.y + c.h/2 - 1, 3, 3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffea80";
                ctx.beginPath();
                ctx.ellipse(c.x + c.w/2 + 1, c.y + c.h/2 + 1, 2, 2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // игрок (стильный герой)
            ctx.shadowBlur = 4;
            ctx.shadowColor = "#00000040";
            // тело комбинезон
            ctx.fillStyle = "#3f729b";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = "#2c5282";
            ctx.fillRect(player.x+4, player.y+player.height-12, player.width-8, 10);
            // голова/капюшон
            ctx.fillStyle = "#ffcf9a";
            ctx.beginPath();
            ctx.ellipse(player.x+player.width/2, player.y+8, 12, 13, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#2e2c2a";
            ctx.beginPath();
            ctx.arc(player.x+player.width/2-4, player.y+6, 2, 0, Math.PI*2);
            ctx.arc(player.x+player.width/2+4, player.y+6, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#c05e2a";
            ctx.beginPath();
            ctx.ellipse(player.x+player.width/2, player.y+12, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            // волосы/шапка
            ctx.fillStyle = "#c9421f";
            ctx.fillRect(player.x+6, player.y-2, player.width-12, 7);
            // глаза блики
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(player.x+player.width/2-5, player.y+4, 1, 0, Math.PI*2);
            ctx.arc(player.x+player.width/2+3, player.y+4, 1, 0, Math.PI*2);
            ctx.fill();
             // шарфик
            ctx.fillStyle = "#e34234";
            ctx.fillRect(player.x+8, player.y+15, 12, 5);
            
            // рюкзак
            ctx.fillStyle = "#6b4c3b";
            ctx.fillRect(player.x+player.width-10, player.y+20, 8, 14);
            ctx.shadowBlur = 0;
            
            // если игра закончена - наложение полупрозрачного сообщения
            if(!gameRunning){
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, W, H);
                ctx.font = "bold 28 monospace";
                ctx.fillStyle = "#ffe9b0";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                let message = (coins.every(c=>c.collected) && score>0) ? "ПОБЕДА! 🎉" : "GAME OVER";
                ctx.fillText(message, W/2, H/2-20);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#ffdd99";
                ctx.fillText("нажми [НОВАЯ ИГРА]", W/2, H/2+35);
                ctx.textAlign = "left";
            }
            
            // подсказка о монетах
            ctx.font = "bold 14monospace";
            ctx.fillStyle = "#382812";
            ctx.shadowBlur = 0;
            ctx.fillText("собери все золотые", W-130, 28);
        }
        
        // ------ ЦИКЛ АНИМАЦИИ ------
        let lastTimestamp = 0;
        function updateGame(){
            if(gameRunning){
                handleInput();
                handleCollisions();
                collectCoins();
                checkWin();
            }
            draw();
            requestAnimationFrame(updateGame);
        }
        
        // обработчики событий клавиатуры
        function keyDownHandler(e){
            let code = e.code;
            if(keys.hasOwnProperty(code)){
                keys[code] = true;
                e.preventDefault();
            }
            // пробел отдельно
            if(code === 'Space'){
                keys.Space = true;
                e.preventDefault();
            }
            // дополнительно блокируем прокрутку стрелками
            if(code === 'ArrowLeft' || code === 'ArrowRight'|| code === 'ArrowUp' || code === 'ArrowDown'){
                e.preventDefault();
            }
        }
        
        function keyUpHandler(e){
            let code = e.code;
            if(keys.hasOwnProperty(code)){
                keys[code] = false;
            }
            if(code === 'Space'){
                keys.Space = false;
            }
            if(code === 'ArrowLeft' || code === 'ArrowRight' || code === 'ArrowUp' || code === 'ArrowDown'){
                e.preventDefault();
            }
        }
        
        // предотвращаем скролл на пробеле
        window.addEventListener('keydown', function(e){
            if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowLeft' || e.code === 'ArrowRight'){
                e.preventDefault();
            }
        });
        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);
        
        // кнопка рестарта
        const resetBtn = document.getElementById('resetGame');
        resetBtn.addEventListener('click', () => {
            resetGame();
            gameRunning = true;
        });
        
        // инициализация
        generateLevel();
        setPlayerStart();
        updateGame();
    })();
</script>
</body>
</html>
